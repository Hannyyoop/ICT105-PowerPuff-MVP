<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-page">

    <nav>

        <h2>Room Booking System</h2>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="admin.html">Manage Rooms</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>

    </nav>

    <div class="admin-container">

        <h1 class="admin-title">Manage Rooms</h1>

        <p class="admin-subtitle">
            Add, edit, or remove rooms available for booking.
        </p>

        <form id="roomForm" class="admin-form">

            <input type="text" placeholder="Room Name (e.g. Room A101)" required>

            <input type="number" placeholder="Capacity" required>

            <input type="text" placeholder="Location" required>

            <button type="submit" class="admin-add-btn">
                Add Room
            </button>

        </form>

        <table class="admin-table">

            <thead>

                <tr>
                    <th>Room</th>
                    <th>Capacity</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="roomTableBody">
            
            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
