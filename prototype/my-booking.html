<!DOCTYPE html>

<body class="bookings-page">

<nav>

    <h2>Room Booking System</h2>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="rooms.html">Rooms</a></li>
        <li><a href="my-booking.html">My Bookings</a></li>
    </ul>

<div class="bookings-container">

    <h1 class="bookings-title">
        My Bookings
    </h1>

    <p class="bookings-subtitle">
        View and manage your room reservations.

    <table class="booking-table">

        <thead>

        <tr>

            <th>Room</th>
            <th>Date</th>
            <th>Time</th>
            <th>Purpose</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr>

            <td>Room A101</td>

            <td>10 July 2026</td>

            <td>09:00 - 11:00</td>

            <td>Group Study</td>

            <td>
                <span class="status confirmed">
                    Confirmed
                </span>
            </td>

            <td>

                <button class="cancel-booking-btn">
                    Cancel
                </button>

            </td>

        </tr>

        <tr>

            <td>Room C301</td>

            <td>15 July 2026</td>

            <td>13:00 - 15:00</td>

            <td>Project Meeting</td>

            <td>

                <span class="status pending">
                    Pending
                </span>

            </td>

            <td>

                <button class="cancel-booking-btn">
                    Cancel
                </button>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<script src="script.js"></script>
