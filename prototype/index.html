<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Room Booking System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="portal-page">

<div class="portal-container">

    <h1 class="portal-title">University Room Booking System</h1>

    <p class="portal-subtitle">
        Choose your portal to continue.
    </p>

    <div class="portal-cards">

        <div class="portal-card">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
            class="portal-image">

            <h2>Student Portal</h2>

            <p>
                View available rooms, search rooms,
                make bookings and manage your reservations.
            </p>

            <a href="room.html" class="portal-btn">
                Enter
            </a>

        </div>

        <div class="portal-card">

            <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png"
            class="portal-image">

            <h2>Staff / Admin</h2>

            <p>
                Manage rooms and view booking information.
            </p>

            <a href="admin.html" class="portal-btn">
                Enter
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
